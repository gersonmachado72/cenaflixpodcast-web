<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${(podcast.id != null) ? 'Editar Podcast' : 'Novo Podcast'} + ' - Cenaflix Podcast'">Formulário Podcast</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/dashboard}">
                <i class="fas fa-podcast me-2"></i>Cenaflix Podcast
            </a>
            <div class="d-flex">
                <a class="btn btn-outline-light btn-sm me-2" th:href="@{/podcasts/listar}">
                    <i class="fas fa-arrow-left me-1"></i>Voltar
                </a>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-white">
                        <h4 class="mb-0">
                            <i class="fas fa-podcast me-2"></i>
                            <span th:text="${(podcast.id != null) ? 'Editar Podcast' : 'Novo Podcast'}">
                                Formulário de Podcast
                            </span>
                            <small th:if="${podcast.id != null}" class="text-muted ms-2">
                                (ID: <span th:text="${podcast.id}"></span>)
                            </small>
                        </h4>
                    </div>
                    
                    <div class="card-body">
                        <form th:action="${(podcast.id != null) ? '/podcasts/editar/' + podcast.id : '/podcasts/salvar'}" 
                              th:object="${podcast}" method="post">
                            
                            <!-- Número do Episódio -->
                            <div class="mb-3">
                                <label for="numeroEpisodio" class="form-label">
                                    <i class="fas fa-hashtag me-1"></i>Número do Episódio *
                                </label>
                                <input type="number" class="form-control" id="numeroEpisodio" 
                                       th:field="*{numeroEpisodio}" required min="1">
                                <div class="form-text">Número sequencial do episódio</div>
                            </div>
                            
                            <!-- Nome do Episódio -->
                            <div class="mb-3">
                                <label for="nomeEpisodio" class="form-label">
                                    <i class="fas fa-heading me-1"></i>Nome do Episódio *
                                </label>
                                <input type="text" class="form-control" id="nomeEpisodio" 
                                       th:field="*{nomeEpisodio}" required maxlength="255">
                                <div class="form-text">Nome completo do episódio</div>
                            </div>
                            
                            <!-- Duração -->
                            <div class="mb-3">
                                <label for="duracao" class="form-label">
                                    <i class="fas fa-clock me-1"></i>Duração
                                </label>
                                <input type="text" class="form-control" id="duracao" 
                                       th:field="*{duracao}" placeholder="HH:MM:SS ou MM:SS">
                                <div class="form-text">Formato: HH:MM:SS ou MM:SS (ex: 01:23:45 ou 45:30)</div>
                            </div>
                            
                            <!-- Produtor -->
                            <div class="mb-3">
                                <label for="produtor" class="form-label">
                                    <i class="fas fa-user-tie me-1"></i>Produtor
                                </label>
                                <input type="text" class="form-control" id="produtor" 
                                       th:field="*{produtor}" maxlength="255">
                                <div class="form-text">Nome do produtor/gravadora</div>
                            </div>
                            
                            <!-- URL do Repositório -->
                            <div class="mb-3">
                                <label for="urlRepositorio" class="form-label">
                                    <i class="fas fa-link me-1"></i>URL do Repositório
                                </label>
                                <input type="url" class="form-control" id="urlRepositorio" 
                                       th:field="*{urlRepositorio}" maxlength="255" 
                                       placeholder="https://exemplo.com/podcast">
                                <div class="form-text">Link para o repositório do podcast</div>
                            </div>
                            
                            <!-- Botões -->
                            <div class="d-flex justify-content-between mt-4">
                                <a class="btn btn-secondary" th:href="@{/podcasts/listar}">
                                    <i class="fas fa-times me-1"></i>Cancelar
                                </a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save me-1"></i>
                                    <span th:text="${(podcast.id != null) ? 'Atualizar' : 'Salvar'}">Salvar</span>
                                </button>
                            </div>
                        </form>
                    </div>
                    
                    <div class="card-footer bg-white">
                        <small class="text-muted">
                            <i class="fas fa-info-circle me-1"></i>
                            Campos marcados com * são obrigatórios
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
