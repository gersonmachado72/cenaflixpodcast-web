<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Cenaflix Podcast - Login</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        <style>
            body {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
                display: flex;
                align-items: center;
            }
            .login-card {
                background: rgba(255, 255, 255, 0.95);
                border-radius: 15px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
                overflow: hidden;
            }
            .login-header {
                background: linear-gradient(135deg, #343a40 0%, #212529 100%);
                color: white;
                padding: 2rem;
                text-align: center;
            }
            .form-control:focus {
                border-color: #667eea;
                box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
            }
            .btn-login {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                border: none;
                color: white;
                padding: 10px 30px;
                font-weight: 600;
                transition: transform 0.3s;
            }
            .btn-login:hover {
                transform: translateY(-2px);
                color: white;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5">
                    <div class="login-card">
                        <div class="login-header">
                            <h1><i class="fas fa-podcast me-2"></i>Cenaflix Podcast</h1>
                            <p class="mb-0">Sistema de Gerenciamento</p>
                        </div>
                        <div class="card-body p-4">
                            <form th:action="@{/login}" method="post">
                                <div class="mb-3">
                                    <label for="username" class="form-label">
                                        <i class="fas fa-user me-1"></i>Usuário
                                    </label>
                                    <input type="text" class="form-control" id="username" 
                                           name="username" required placeholder="Digite seu usuário">
                                </div>
                                <div class="mb-3">
                                    <label for="password" class="form-label">
                                        <i class="fas fa-lock me-1"></i>Senha
                                    </label>
                                    <input type="password" class="form-control" id="password" 
                                           name="password" required placeholder="Digite sua senha">
                                </div>
                                <div class="text-center mt-3">
                                    <p class="mb-2">Não tem uma conta?</p>
                                    <a href="/usuarios/novo" class="btn btn-outline-primary btn-sm">
                                        <i class="fas fa-user-plus me-1"></i>Cadastre-se aqui
                                    </a>
                                </div>

                                <!-- Mensagem de erro -->
                                <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show">
                                    <i class="fas fa-exclamation-triangle me-2"></i>
                                    Usuário ou senha inválidos!
                                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
                                </div>

                                <!-- Mensagem de logout -->
                                <div th:if="${param.logout}" class="alert alert-success alert-dismissible fade show">
                                    <i class="fas fa-check-circle me-2"></i>
                                    Você foi desconectado com sucesso!
                                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
                                </div>

                                <div class="d-grid mt-4">
                                    <button type="submit" class="btn btn-login btn-lg">
                                        <i class="fas fa-sign-in-alt me-2"></i>Entrar
                                    </button>
                                </div>
                            </form>

                            <hr class="my-4">

                            <div class="text-center">
                                <small class="text-muted">
                                    <i class="fas fa-info-circle me-1"></i>
                                    Sistema de Gerenciamento de Podcasts v1.0.0
                                </small>
                                <br>
                                <small class="text-muted">
                                    &copy; 2024 Cenaflix Podcast. Todos os direitos reservados.
                                </small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
        <script>
            // Auto-fechar alerts após 5 segundos
            setTimeout(function () {
                var alerts = document.querySelectorAll('.alert');
                alerts.forEach(function (alert) {
                    if (alert.classList.contains('alert-dismissible')) {
                        const bsAlert = new bootstrap.Alert(alert);
                        bsAlert.close();
                    }
                });
            }, 5000);

            // Focar no campo de usuário ao carregar a página
            document.addEventListener('DOMContentLoaded', function () {
                document.getElementById('username').focus();
            });
        </script>
    </body>
</html>
