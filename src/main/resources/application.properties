spring.application.name=cenaflixpodcast-web

# ===============================
# DATABASE CONFIGURATION
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/cenaflixpodcast
spring.datasource.username=username
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# ===============================
# JPA/HIBERNATE CONFIGURATION
# ===============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ===============================
# FILE UPLOAD CONFIGURATION
# ===============================
file.upload-dir=./uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=8081
server.servlet.context-path=/
server.servlet.session.timeout=30m
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=2048

# ===============================
# THYMELEAF CONFIGURATION
# ===============================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# Logging - CONTROLE ESPEC\u00cdFICO (evita logs excessivos)
logging.level.root=WARN
logging.level.com.cenaflixpodcast=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN

# Logs espec\u00edficos para debug quando necess\u00e1rio
# logging.level.com.cenaflixpodcast.controller=DEBUG
# logging.level.org.springframework.web=DEBUG
# logging.level.org.thymeleaf=DEBUG

# Para ver erros espec\u00edficos
logging.level.org.springframework.web.servlet.DispatcherServlet=WARN
logging.level.org.thymeleaf.TemplateEngine=ERROR

# ===============================
# SWAGGER/OPENAPI CONFIGURATION
# ===============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.packages-to-scan=com.cenaflixpodcast.controller.api
springdoc.paths-to-match=/api/**

# ===============================
# SPRING SECURITY
# ===============================
# Usu\u00c3\u00a1rios configurados no SecurityConfig

# Logs espec\u00c3\u00adficos para diagn\u00c3\u00b3stico
logging.level.com.cenaflixpodcast.controller.web.PodcastController=TRACE
logging.level.com.cenaflixpodcast.service.PodcastService=DEBUG
logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=TRACE
logging.level.com.cenaflixpodcast=DEBUG
logging.level.com.cenaflixpodcast.repository=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.web=DEBUG
# Para ver erros 404 detalhados
logging.level.org.springframework.web.servlet.resource.ResourceHttpRequestHandler=DEBUG
